<!DOCTYPE html>

<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TP - Manipulation du DOM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

```
<h1 id="titre-principal">Bienvenue sur la page TP</h1>

<div id="container">
    <p>Paragraphe introductif hors bloc.</p>

    <div id="bloc">
        <span class="etiquette">Bloc principal</span>
        <p class="para">Paragraphe A dans le bloc</p>
        <p class="para">Paragraphe B dans le bloc</p>
        <p class="para emphase">Paragraphe C dans le bloc (emphase)</p>
    </div>

    <div id="zone-ajout"></div>
</div>

<button id="btn-action">Cliquez ici</button>
<button id="btn-cacher">Cacher</button>
<button id="btn-montrer">Afficher</button>

<div>
    <input type="text" id="champ-texte" placeholder="Ecrivez quelque chose...">
    <button id="btn-ajouter">Ajouter</button>
    <ul id="ma-liste"></ul>
</div>

<script src="script.js"></script>
```

</body>
</html>
